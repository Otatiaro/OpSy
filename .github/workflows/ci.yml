name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Force Node.js 24 for any JavaScript actions that still ship with a
# Node.js 20 manifest. Node.js 20 is deprecated on GitHub Actions and
# scheduled for removal in September 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build (${{ matrix.compiler }} / cortex-${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        target: [m3, m4, m7, m33]
    steps:
      - uses: actions/checkout@v5

      - name: Install GCC ARM toolchain
        if: matrix.compiler == 'gcc'
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '14.3.Rel1'

      - name: Install LLVM Embedded Toolchain for Arm
        if: matrix.compiler == 'clang'
        uses: stellar-aria/llvm-embedded-toolchain-for-arm-action@latest
        # 19.1.1 is the latest version the action knows about. 19.1.5 exists
        # upstream but the action's release table hasn't been bumped to
        # include it yet. 19.1.1 is the same toolchain family — fine for
        # a compile-only sanity check.
        with:
          release: '19.1.1'

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: >
          cmake -S tests -B build
          -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/tests/cortex-m-toolchain.cmake
          -DOPSY_COMPILER=${{ matrix.compiler }}
          -DOPSY_TARGET=${{ matrix.target }}

      - name: Build
        run: cmake --build build --parallel
