name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Force Node.js 24 for any JavaScript actions that still ship with a
# Node.js 20 manifest. Node.js 20 is deprecated on GitHub Actions and
# scheduled for removal in September 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build (cortex-${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [m4, m7, m33]
    steps:
      - uses: actions/checkout@v5

      - name: Install ARM toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '14.3.Rel1'

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: >
          cmake -S tests -B build
          -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/tests/cortex-m-toolchain.cmake
          -DOPSY_TARGET=${{ matrix.target }}

      - name: Build
        run: cmake --build build --parallel
