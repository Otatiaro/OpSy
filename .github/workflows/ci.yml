name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Force Node.js 24 for any JavaScript actions that still ship with a
# Node.js 20 manifest. Node.js 20 is deprecated on GitHub Actions and
# scheduled for removal in September 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build (${{ matrix.compiler }} / cortex-${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        target: [m3, m4, m7, m33]
    steps:
      - uses: actions/checkout@v5

      - name: Install GCC ARM toolchain
        if: matrix.compiler == 'gcc'
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '14.3.Rel1'

      - name: Install LLVM Embedded Toolchain for Arm
        if: matrix.compiler == 'clang'
        run: |
          version=19.1.5
          asset=LLVM-ET-Arm-${version}-Linux-x86_64.tar.xz
          # --retry handles transient 5xx from the GitHub release CDN;
          # --retry-all-errors covers DNS / connection blips on top of that.
          curl --fail --retry 5 --retry-delay 5 --retry-all-errors -L \
            -o /tmp/${asset} \
            https://github.com/ARM-software/LLVM-embedded-toolchain-for-Arm/releases/download/release-${version}/${asset}
          sudo mkdir -p /opt
          sudo tar -xJf /tmp/${asset} -C /opt
          echo "/opt/LLVM-ET-Arm-${version}-Linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: >
          cmake -S tests -B build
          -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/tests/cortex-m-toolchain.cmake
          -DOPSY_COMPILER=${{ matrix.compiler }}
          -DOPSY_TARGET=${{ matrix.target }}

      - name: Build
        run: cmake --build build --parallel
